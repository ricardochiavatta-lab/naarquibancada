<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleção de Time — Na Arquibancada</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--surface:#111;--card:#1a1a1a;--border:#2a2a2a;--text:#F5F2EC;--muted:#555;--gold:#C9A84C;--gold2:#E8D080;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* BG */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(201,168,76,.1) 0%,transparent 60%);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;min-height:100vh;padding:3rem clamp(1rem,4vw,2.5rem) 4rem}
.max{max-width:960px;margin:0 auto}

/* HEADER */
.ts-header{text-align:center;margin-bottom:2.5rem}
.ts-nav{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1.25rem}
.ts-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,5.5rem);line-height:.9;
  background:linear-gradient(180deg,#fff 0%,#C9A84C 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.75rem}
.ts-sub{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

/* ADMIN TOGGLE */
.admin-bar{display:flex;justify-content:center;margin-bottom:2rem}
.btn-admin{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem 1rem;border-radius:20px;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.btn-admin:hover{border-color:var(--gold);color:var(--gold)}
.btn-admin.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

/* SECTION LABEL */
.section-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,.15)}

/* TEAMS GRID */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.85rem;margin-bottom:2.5rem}

/* TEAM CARD */
.t-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem .75rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;text-align:center;transition:all .22s}
.t-card.available{cursor:pointer}
.t-card.available:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 32px rgba(201,168,76,.15)}
.t-card.available:hover .t-name{color:var(--gold)}
.t-card.soon{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}

/* Logo area */
.t-logo-wrap{width:60px;height:60px;display:flex;align-items:center;justify-content:center;position:relative}
.t-logo{width:56px;height:56px;object-fit:contain;transition:transform .22s}
.t-card.available:hover .t-logo{transform:scale(1.1)}
.t-logo-placeholder{width:56px;height:56px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted)}

/* Edit button (admin mode) */
.t-edit{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;line-height:1}
.t-edit:hover{background:rgba(201,168,76,.3)}
.admin-mode .t-card .t-edit{display:flex}

/* Badges */
.t-badge{position:absolute;top:7px;left:7px;border-radius:20px;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;padding:.15rem .5rem;font-family:'Barlow',sans-serif;font-weight:700}
.badge-available{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.badge-soon{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}

.t-name{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.06em;color:var(--text);transition:color .2s;line-height:1.2}

/* UPLOAD MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;width:100%;max-width:400px;transform:translateY(16px);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.modal-ttl{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em}
.modal-x{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;line-height:1;padding:.2rem}
.modal-x:hover{color:var(--text)}

/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:1.25rem}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(201,168,76,.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:2.5rem;margin-bottom:.5rem;opacity:.5}
.upload-text{font-size:.85rem;color:var(--muted);line-height:1.5}
.upload-text strong{color:var(--gold);display:block;margin-bottom:.2rem}

/* Preview */
.upload-preview{display:none;flex-direction:column;align-items:center;gap:.75rem;margin-bottom:1.25rem}
.upload-preview.show{display:flex}
.preview-img{width:80px;height:80px;object-fit:contain;border-radius:8px;background:var(--card);border:1px solid var(--border);padding:4px}
.preview-name{font-size:.78rem;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-clear{background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;text-decoration:underline}
.btn-clear:hover{color:var(--loss,#e05454)}

/* Buttons */
.modal-actions{display:flex;gap:.75rem}
.btn-save{flex:1;padding:.7rem;border-radius:5px;border:none;background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.08em;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-save:hover{background:var(--gold2)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel{padding:.7rem 1rem;border-radius:5px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.85rem;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s}
.btn-cancel:hover{color:var(--text);border-color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:9000;background:var(--card);border:1px solid var(--gold);border-radius:8px;padding:.85rem 1.4rem;font-size:.88rem;transform:translateY(80px);transition:transform .3s;pointer-events:none}
.toast.show{transform:translateY(0)}

/* Loading spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.6rem}
  .t-logo-wrap{width:50px;height:50px}
  .t-logo,.t-logo-placeholder{width:46px;height:46px}
}
</style>
</head>
<body>

<div class="page">
  <div class="max">

    <div class="ts-header">
      <div class="ts-nav">⚽ &nbsp; Na Arquibancada</div>
      <div class="ts-title">ESCOLHA<br>SEU TIME</div>
      <div class="ts-sub">Brasileirão Série A 2026</div>
    </div>

    <div class="admin-bar">
      <button class="btn-admin" id="btn-admin" onclick="toggleAdmin()">⚙ Modo Admin</button>
    </div>

    <!-- Times disponíveis -->
    <div class="section-label">Times disponíveis</div>
    <div class="teams-grid" id="grid-available"></div>

    <!-- Em breve -->
    <div class="section-label">Em breve</div>
    <div class="teams-grid" id="grid-soon"></div>

  </div>
</div>

<!-- Upload Modal -->
<div class="overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="modal-ttl">Upload Logo</div>
      <button class="modal-x" onclick="closeModal()">&#x2715;</button>
    </div>

    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/svg+xml,image/webp" onchange="onFileSelect(event)">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">
        <strong>Clique ou arraste o escudo aqui</strong>
        PNG, JPG ou SVG · Recomendado: 200×200px
      </div>
    </div>

    <div class="upload-preview" id="upload-preview">
      <img id="preview-img" class="preview-img" src="" alt="preview">
      <span id="preview-name" class="preview-name"></span>
      <button class="btn-clear" onclick="clearFile()">Escolher outro arquivo</button>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="uploadLogo()" disabled>
        <span id="save-label">Salvar Logo</span>
        <div class="spinner" id="save-spinner" style="display:none"></div>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
var SUPA_URL = 'https://swvzomkyxrocstdsvtsk.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3dnpvbWt5eHJvY3N0ZHN2dHNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjQ5MTgsImV4cCI6MjA5MjA0MDkxOH0._4u6VOyoopoCAdDk8Tc8sZZcAhnjnvmcS9N7lp_e_vc';
var BUCKET = 'logos';

var _sb = null;
function getSupa() {
  if (!_sb && window.supabase) _sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  return _sb;
}

// ── TIMES ──
var TEAMS = [
  // Disponíveis - 4 grandes SP
  {id:'corinthians',  name:'Corinthians',        available:true},
  {id:'palmeiras',    name:'Palmeiras',           available:true},
  {id:'sao-paulo',    name:'São Paulo',           available:true},
  {id:'santos',       name:'Santos',              available:true},
  // Disponíveis - 4 grandes RJ
  {id:'flamengo',     name:'Flamengo',            available:true},
  {id:'fluminense',   name:'Fluminense',          available:true},
  {id:'botafogo',     name:'Botafogo',            available:true},
  {id:'vasco',        name:'Vasco',               available:true},
  // Disponíveis - MG
  {id:'atletico-mg',  name:'Atlético MG',         available:true},
  {id:'cruzeiro',     name:'Cruzeiro',            available:true},
  // Disponíveis - RS
  {id:'gremio',       name:'Grêmio',              available:true},
  {id:'internacional',name:'Internacional',       available:true},
  // Em breve
  {id:'bragantino',   name:'RB Bragantino',       available:false},
  {id:'fortaleza',    name:'Fortaleza',           available:false},
  {id:'bahia',        name:'Bahia',               available:false},
  {id:'atletico-pr',  name:'Athletico PR',        available:false},
  {id:'mirassol',     name:'Mirassol',            available:false},
  {id:'ceara',        name:'Ceará',               available:false},
  {id:'sport',        name:'Sport',               available:false},
  {id:'vitoria',      name:'Vitória',             available:false},
  {id:'coritiba',     name:'Coritiba',            available:false},
  {id:'chapecoense',  name:'Chapecoense',         available:false},
  {id:'remo',         name:'Remo',                available:false},
];

// ── STATE ──
var logos = {};      // {team_id: url}
var adminMode = false;
var currentTeam = null;
var selectedFile = null;

// ── INIT ──
async function init() {
  await loadLogos();
  renderGrid();
}

async function loadLogos() {
  var sp = getSupa();
  if (!sp) return;
  var {data, error} = await sp.from('team_logos').select('team_id, logo_url');
  if (!error && data) {
    data.forEach(function(row) {
      logos[row.team_id] = row.logo_url;
    });
  }
}

// ── RENDER ──
function renderGrid() {
  var available = TEAMS.filter(function(t) { return t.available; });
  var soon = TEAMS.filter(function(t) { return !t.available; });

  document.getElementById('grid-available').innerHTML = available.map(cardHtml).join('');
  document.getElementById('grid-soon').innerHTML = soon.map(cardHtml).join('');
}

function cardHtml(t) {
  var logoUrl = logos[t.id];
  var logoHtml;

  if (logoUrl) {
    logoHtml = '<img class="t-logo" src="' + logoUrl + '" alt="' + t.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
               '<div class="t-logo-placeholder" style="display:none">' + ini(t.name) + '</div>';
  } else {
    logoHtml = '<div class="t-logo-placeholder">' + ini(t.name) + '</div>';
  }

  var badge = t.available
    ? '<div class="t-badge badge-available">Disponível</div>'
    : '<div class="t-badge badge-soon">Em breve</div>';

  var editBtn = '<button class="t-edit" onclick="openUpload(event,\'' + t.id + '\',\'' + esc(t.name) + '\')" title="Editar logo">✏</button>';

  var clickAttr = t.available ? 'onclick="pickTeam(\'' + t.id + '\')"' : '';
  var cls = 't-card ' + (t.available ? 'available' : 'soon');

  return '<div class="' + cls + '" data-id="' + t.id + '" ' + clickAttr + '>' +
    badge + editBtn +
    '<div class="t-logo-wrap">' + logoHtml + '</div>' +
    '<div class="t-name">' + esc(t.name) + '</div>' +
    '</div>';
}

function ini(n) {
  return n.split(' ').map(function(w) { return w[0]; }).join('').slice(0,3).toUpperCase();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ADMIN ──
function toggleAdmin() {
  adminMode = !adminMode;
  document.body.classList.toggle('admin-mode', adminMode);
  var btn = document.getElementById('btn-admin');
  btn.classList.toggle('active', adminMode);
  btn.textContent = adminMode ? '✕ Sair do Admin' : '⚙ Modo Admin';
}

// ── PICK TEAM ──
function pickTeam(id) {
  if (adminMode) return;
  toast('Time selecionado! Entrando... ⚽');
  // Aqui vai a lógica de salvar o time e entrar no app
  setTimeout(function() {
    alert('Entrar no app como: ' + id);
  }, 800);
}

// ── UPLOAD MODAL ──
function openUpload(e, teamId, teamName) {
  e.stopPropagation();
  currentTeam = {id: teamId, name: teamName};
  selectedFile = null;
  document.getElementById('modal-ttl').textContent = teamName;
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('upload-preview').classList.remove('show');
  document.getElementById('btn-save').disabled = true;
  document.getElementById('save-label').textContent = 'Salvar Logo';
  document.getElementById('save-spinner').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('upload-modal').classList.remove('open');
  currentTeam = null;
  selectedFile = null;
}

function onFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  selectedFile = file;

  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('upload-preview').classList.add('show');
    document.getElementById('btn-save').disabled = false;
  };
  reader.readAsDataURL(file);
}

function clearFile() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('upload-preview').classList.remove('show');
  document.getElementById('btn-save').disabled = true;
}

async function uploadLogo() {
  if (!selectedFile || !currentTeam) return;

  var btn = document.getElementById('btn-save');
  var label = document.getElementById('save-label');
  var spinner = document.getElementById('save-spinner');
  btn.disabled = true;
  label.textContent = 'Enviando...';
  spinner.style.display = 'block';

  try {
    var sp = getSupa();
    var ext = selectedFile.name.split('.').pop().toLowerCase();
    var path = currentTeam.id + '.' + ext;

    // Upload to Storage
    var {data: upData, error: upErr} = await sp.storage
      .from(BUCKET)
      .upload(path, selectedFile, {upsert: true, contentType: selectedFile.type});

    if (upErr) throw upErr;

    // Get public URL
    var {data: urlData} = sp.storage.from(BUCKET).getPublicUrl(path);
    var publicUrl = urlData.publicUrl + '?t=' + Date.now(); // cache bust

    // Save to team_logos table
    var {error: dbErr} = await sp.from('team_logos').upsert({
      team_id: currentTeam.id,
      team_name: currentTeam.name,
      logo_url: urlData.publicUrl
    }, {onConflict: 'team_id'});

    if (dbErr) throw dbErr;

    // Update local cache and re-render
    logos[currentTeam.id] = publicUrl;
    renderGrid();
    closeModal();
    toast('Logo do ' + currentTeam.name + ' salvo! ✅');

  } catch (err) {
    console.error(err);
    toast('Erro: ' + (err.message || 'tente novamente'));
    btn.disabled = false;
    label.textContent = 'Salvar Logo';
    spinner.style.display = 'none';
  }
}

// Drag & drop
var zone = null;
document.addEventListener('DOMContentLoaded', function() {
  zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag');
    var file = e.dataTransfer.files[0];
    if (file) {
      selectedFile = file;
      var fakeEvent = {target: {files: [file]}};
      onFileSelect(fakeEvent);
    }
  });
});

// Close on backdrop
document.getElementById('upload-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Toast
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// Init
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
